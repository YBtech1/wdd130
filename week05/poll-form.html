<!DOCTYPE hmtl>
<html lang="en"

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Yaw Duodu Boakye">
    <meta name="description" content="Practising HTML Forms Week05">
    <title>HTML Forms</title>
    <link rel="stylesheet" href="/wdd130/week05/styles/poll-form.css">
</head>

<body>
    <header>

    </header>
    <main>
    <form>
        <div class="form-item column2">
        <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>

        <div class="form-item column2">
            <label for="useremail">Email Address</label>
                <input type="email" id="useremail" name="useremail" required>
                <label for="quantity">Select Quantity</label>
                <select name="quantity" id="quantity">
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
        </div>
        <div class="form-item column1">
                <label for="question">What is your favorite browser?</label>
                <select name="favbrowser" id="browsers">
                    <option value="1">Chrome</option>
                    <option value="2">Safari</option>
                    <option value="3">Edge</option>
                </select>
        </div>
<div class="form-item column1">
                <label for="question">Do you have a pet?</label>
                <input type="checkbox" id="pet" name="choose"></input>
</div>
<div class="form-item">
                <label for="question">List places you have lived</label>
                <textarea id="message" name="places" rows="4" placeholder="Accra, Kumasi, Cape Coast"></textarea>
                <button type="submit">Submit About Information</button>
</div>
    </form>
    </main>
    <footer>

    </footer>
</body>

</html>
