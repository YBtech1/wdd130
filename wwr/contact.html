<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="This is a contact webpage that contains a form for visitors of the 
        site to input their details for us to reach out">
        <meta name="author" content="Yaw Duodu Boakye">
        <title>Contact Us</title>
        <link rel="stylesheet" href="styles/rafting.css">
    </head>

    <body>
        <header>
            <img src="images/z-wwr-oars.png" alt="Company Icon" width=200>
            
            <nav>
                <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>

        </header>
    
        <main>
            <div class="contact-head">
            <h1>White Water Rafting Company</h1>
            <p>Tesano, Accra</p>
            <p>11 Adaman Crescent</p>
            <p>+233 551 505 236</p>
            <p>info@whitewater.com</p>
            </div>
            <div class="contact-grid">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3970.7878311721165!2d-0.22406009999999996!3d5.598334200000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdf9a29f8f03a41%3A0x453b560245f962b6!2s11%20Adaman%20Cres%2C%20Accra!5e0!3m2!1sen!2sgh!4v1775264070954!5m2!1sen!2sgh" width="400" height="300" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

            <form>
    <div class="contact-item">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="eg. Emmanuel Jake">
    </div>

    <div class="contact-item">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="eg. waterrafting@gmail.com">
    </div>

    <div class="contact-item1">
        <p>Message Purpose</p>
        
        <label for="general">General Enquiry</label>
        <input type="radio" id="general" name="purpose" value="general">
        
        <label for="reservation">Reservation Question</label>
        <input type="radio" id="reservation" name="purpose" value="reservation">
        
        <label for="suggestion">Website Suggestion</label>
        <input type="radio" id="suggestion" name="purpose" value="suggestion">
        
    </div>

    <div class="contact-item">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4"></textarea>
    </div>

    <div class="contact-item">
        <input type="checkbox" id="subscribe" name="subscription">
        <label for="subscribe">Please subscribe to the monthly newsletter</label>
    </div>

    <button type="submit">Get in Touch!</button>
</form>
            </div>
            
            <h2>We Are Here to Serve You</h2>
            <div class="employee-details">
            <figure>
            <img src="/wdd130/wwr/images/alicia-laura.jpg" alt="Alicia Laura White Water Rafting Employee" width="200">
            <figcaption>Alicia Laura</figcaption>
            </figure>
            <figure>
            <img src="/wdd130/wwr/images/helene-smith.jpg" alt="Helene Smith White Water Rafting Employee" width="200">
            <figcaption>Helene Smith</figcaption>
            </figure>
            <figure>
            <img src="/wdd130/wwr/images/petra-eva.jpg" alt="Petra Eva White Water Rafting Employee" width="200">
            <figcaption>Petra Eva</figcaption>
            </figure>
            </div>
        </main>

        <footer>
            <p>©️2026 | White Water Rafting | Yaw Boakye</p>
            <nav class="socialmedia">
                <a href="facebook.com">
                    <img src="images/facebook-logo.png" alt="social media icon; Facebook" width="50">
                </a>
                <a href="linkedin.com">

                </a>
                <a href="instagram.com">
                    <img src="images/instagram-logo.png" alt="social media icon; Instagram" width="50">
                </a>


            </nav>

        </footer>
    </body>
</html>
